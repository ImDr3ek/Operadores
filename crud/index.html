<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUDDDD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>CRUD</h1>

<div id="form">

    <div class="container-inputs">
        <label for="">Nome</label>
        <input id="input-nome" type="text">
    </div>

    <div class="container-inputs">
        <label for="">Altura</label>
        <input id="input-altura" type="text">
    </div>

    <div class="container-inputs">
        <label for="">Cor</label>
        <input id="input-cor" type="text">
    </div>

    <div class="container-inputs">
        <label for="">Preço</label>
        <input id="input-preco" type="text">
    </div>
    <div class="container-inputs">
        <label for="">ID</label>
        <input id="input-id" type="text">
    </div>

<button onclick="cadastrarDino()">➕</button>
<button onclick="salvarDino()">💾</button>
<button onclick="eliminarDino()">🗑️</button>
</div>

    <div id="button-Mos-Pes">
        <button onclick="mostrarTodos()"></button>
        <button onclick="pesquisar()">🔎</button>
        
    </div>

<div id="painelDinos">
</div>
    <script src="script.js"></script>
</body>
</html>
